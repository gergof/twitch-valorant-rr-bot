services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: twitchrr
      POSTGRES_PASSWORD: twitchrr
      POSTGRES_DB: twitchrr
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql"
  redis:
    image: redis:8
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - "redis_data:/data"
volumes:
  postgres_data: {}
  redis_data: {}
